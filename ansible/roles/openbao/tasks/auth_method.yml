---
- name: "Get all openbao auth"
  ansible.builtin.uri:
    url: "{{ openbao_url }}/v1/sys/auth"
    method: GET
    return_content: true
    status_code:
      - 200
    headers:
      Content-Type: application/json
      X-Vault-Token: "{{ openbao_root_token }}"
    ca_path: "{{ openbao_ca_path }}"
  delegate_to: localhost
  register: openbao_auth_response

- name: "Enable openbao auth {{ item.name }}"
  ansible.builtin.uri:
    url: "{{ openbao_url }}/v1/sys/auth/{{ item.path }}"
    method: POST
    return_content: true
    body_format: json
    body: "{{ lookup('ansible.builtin.template', 'auth_method.json.j2') }}"
    status_code:
      - 200
      - 204
    headers:
      Content-Type: application/json
      X-Vault-Token: "{{ openbao_root_token }}"
    ca_path: "{{ openbao_ca_path }}"
  delegate_to: localhost
  when: item.path + '/' not in openbao_auth_response.json.data
  with_items: "{{ openbao_auth_methods }}"
