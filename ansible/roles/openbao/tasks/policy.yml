---
- name: "Create openbao policy {{ item.name }}"
  ansible.builtin.uri:
    url: "{{ openbao_url }}/v1/sys/policies/acl/{{ item.name }}"
    method: POST
    return_content: true
    body_format: json
    body: "{{ lookup('ansible.builtin.template', 'policy.json.j2') }}"
    status_code:
      - 200
      - 204
    headers:
      Content-Type: application/json
      X-Vault-Token: "{{ openbao_root_token }}"
    ca_path: "{{ openbao_ca_path }}"
  delegate_to: localhost
