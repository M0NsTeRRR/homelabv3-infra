---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: openbao
spec:
  vault:
    path: pki/sign/cert-manager-openbao
    server: https://openbao-active.openbao.svc:8200
    caBundleSecretRef:
      name: "homelab-ca"
      key: "ca.crt"
    auth:
      kubernetes:
        role: cert-manager-openbao
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager-openbao
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: postgres-client-ca
spec:
  vault:
    path: pki/sign/cert-manager-postgres-client-ca
    server: https://openbao-active.openbao.svc:8200
    caBundleSecretRef:
      name: "homelab-ca"
      key: "ca.crt"
    auth:
      kubernetes:
        role: cert-manager-postgres-client-ca
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager-openbao
