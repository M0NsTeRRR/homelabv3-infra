---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  chartRef:
    kind: OCIRepository
    name: seerr
  interval: 1h
  values:
    podAnnotations:
      reloader.stakater.com/auto: "true"

    extraEnvFrom:
      - configMapRef:
          name: seerr
      - secretRef:
          name: seerr-openbao

    config:
      persistence:
        volumeName: ${APP}

    volumes:
      - name: &volume-ca ca-certs
        configMap:
          name: homelab-ca
      - name: &volume-postgres postgres-certs
        secret:
          secretName: postgres-cert-${APP}
          defaultMode: 0400
    volumeMounts:
      - name: *volume-ca
        mountPath: /var/run/secrets/root-ca/ca.crt
        subPath: ca.crt
        readOnly: true
      - name: *volume-postgres
        mountPath: /var/run/secrets/postgresql
        readOnly: true

    route:
      main:
        enabled: true
        kind: HTTPRoute
        apiVersion: gateway.networking.k8s.io/v1
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: seerr
          gethomepage.dev/description: Media System
          gethomepage.dev/icon: seerr.png
        parentRefs:
          - name: internal
            namespace: gateway
        hostnames:
          - seerr.unicornafk.fr
