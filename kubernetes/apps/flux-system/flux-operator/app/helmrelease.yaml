---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
  interval: 1h
  values:
    serviceMonitor:
      create: true
    web:
      config:
        authentication:
          type: Anonymous
          anonymous:
            username: flux
            groups:
              - flux-admin
      httpRoute:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Other
          gethomepage.dev/name: Flux
          gethomepage.dev/description: Open and extensible continuous delivery solution for Kubernetes. Powered by GitOps Toolkit.
        parentRefs:
          - name: internal
            namespace: gateway
        hostnames:
          - flux.unicornafk.fr
      networkPolicy:
        create: false
