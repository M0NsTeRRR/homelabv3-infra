---
- name: "Get all openbao secret engine"
  ansible.builtin.uri:
    url: "{{ openbao_url }}/v1/sys/mounts"
    method: GET
    return_content: true
    body_format: json
    status_code:
      - 200
    headers:
      Content-Type: application/json
      X-Vault-Token: "{{ openbao_root_token }}"
    ca_path: "{{ openbao_ca_path }}"
  delegate_to: localhost
  register: openbao_secret_engine_response

- name: "Enable openbao secret engine {{ item.name }}"
  ansible.builtin.uri:
    url: "{{ openbao_url }}/v1/sys/mounts/{{ item.path }}"
    method: POST
    return_content: true
    body_format: json
    body: "{{ lookup('ansible.builtin.template', 'secret_engine.json.j2') }}"
    status_code:
      - 200
      - 204
    headers:
      Content-Type: application/json
      X-Vault-Token: "{{ openbao_root_token }}"
    ca_path: "{{ openbao_ca_path }}"
  delegate_to: localhost
  when: item.path + '/' not in openbao_secret_engine_response.json.data
  with_items: "{{ openbao_secrets_engine }}"
