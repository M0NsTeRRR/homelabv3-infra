---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pooler-cert-rw
spec:
  cluster:
    name: postgres
  type: rw
  pgbouncer:
    authQuery: "SELECT usename, passwd FROM public.user_search($1)"
    serverCASecret:
      name: postgres-server-cert
    serverTLSSecret:
      name: postgres-server-cert
    clientCASecret:
      name: pooler-cert-rw
    clientTLSSecret:
      name: pooler-cert-rw
    parameters:
      max_client_conn: "1000"
      default_pool_size: "10"
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: pooler-pw-rw
spec:
  cluster:
    name: postgres
  type: rw
  pgbouncer:
    authQuery: "SELECT usename, passwd FROM public.user_search($1)"
    serverCASecret:
      name: postgres-server-cert
    serverTLSSecret:
      name: postgres-server-cert
    clientTLSSecret:
      name: pooler-pw-rw
    parameters:
      max_client_conn: "1000"
      default_pool_size: "10"
