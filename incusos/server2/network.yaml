interfaces:
  - name: lan
    hwaddr: "1c:83:41:40:6b:73"
    lldp: true
    addresses:
      - "192.168.40.12/24"
      - "2a0c:b641:2c0:140::12/64"
    routes:
      - to: "0.0.0.0/0"
        via: "192.168.40.1"
      - to: "::/0"
        via: "2a0c:b641:2c0:140::1"
    roles:
      - cluster
      - management
      - instances
    vlan_tags:
      - 10
      - 20

dns:
  hostname: "server2"
  domain: "unicornafk.fr"
  nameservers:
    - "192.168.6.1"
    - "2a0c:b641:2c0:106::1"
  search_domains:
    - "unicornafk.fr"

time:
  ntp_servers:
    - "ntp.unicornafk.fr"
  timezone: "Europe/Paris"
