---
- name: "Create openbao secret {{ item.path }}" # noqa: ignore-errors
  ansible.builtin.uri:
    url: "{{ openbao_url }}/v1/{{ item.path }}"
    method: POST
    return_content: true
    body_format: json
    body: "{{ lookup('ansible.builtin.template', 'data.json.j2') }}"
    status_code:
      - 200
      - 204
    headers:
      Content-Type: application/json
      X-Vault-Token: "{{ openbao_root_token }}"
    ca_path: "{{ openbao_ca_path }}"
  ignore_errors: "{{ item.ignore_errors is defined and item.ignore_errors }}"
  delegate_to: localhost
