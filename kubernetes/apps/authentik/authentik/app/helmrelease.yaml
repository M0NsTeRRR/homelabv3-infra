---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  chartRef:
    kind: OCIRepository
    name: authentik
  interval: 1h
  values:
    global:
      podAnnotations:
        reloader.stakater.com/auto: "true"
      envFrom:
        - configMapRef:
            name: authentik
        - secretRef:
            name: authentik-openbao
      volumes:
        - name: &volume-ca ca-certs
          configMap:
            name: homelab-ca
        - name: &volume-postgres postgres-certs
          secret:
            secretName: postgres-cert-${APP}
            defaultMode: 0400
      volumeMounts:
        - name: *volume-ca
          mountPath: /var/run/secrets/root-ca/ca.crt
          subPath: ca.crt
          readOnly: true
        - name: *volume-postgres
          mountPath: /var/run/secrets/postgresql
          defaultMode: 0400
          readOnly: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    redis:
      enabled: true

    server:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      volumes:
        - name: &volume-images images
          configMap:
            name: authentik-images
      volumeMounts:
        - name: *volume-images
          mountPath: /media/public/unicornafk.svg
          subPath: unicornafk.svg
          readOnly: true

      route:
        main:
          enabled: true
          kind: HTTPRoute
          apiVersion: gateway.networking.k8s.io/v1
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: Infrastructure
            gethomepage.dev/name: Authentik
            gethomepage.dev/description: Identity Provider
            gethomepage.dev/icon: authentik.png
          parentRefs:
            - name: internal
              namespace: gateway
          hostnames:
            - sso.unicornafk.fr

    prometheus:
      rules:
        enabled: true
